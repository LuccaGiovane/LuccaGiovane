name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"  # Roda todo dia à meia-noite
  workflow_dispatch:      # Permite rodar manualmente

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate snake with custom colors
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            output/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#5cdcf4&color_dots=#0d1117,#0d3d38,#0d5c52,#22d3ee,#5cdcf4

      - name: Commit snake
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p output
          git add output/github-contribution-grid-snake-dark.svg
          git diff --staged --quiet || (git commit -m "chore: update contribution snake" && git push)
