name: Update README stats

on:
  schedule:
    - cron: "0 0 * * *"  # Roda todo dia à meia-noite
  workflow_dispatch:      # Permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: 'username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&count_private=true&theme=catppuccin_mocha&hide_border=true&locale=en&title_color=8839ef&icon_color=8839ef&text_color=cdd6f4&bg_color=1e1e2e'
          path: output/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: top-langs
          options: 'username=${{ github.repository_owner }}&layout=compact&langs_count=8&count_private=true&theme=catppuccin_mocha&hide_border=true&locale=en&title_color=8839ef&text_color=cdd6f4&bg_color=1e1e2e&size_weight=0.5&count_weight=0.5&exclude_repo=UEL-CompGrafica'
          path: output/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p output
          git add output/stats.svg output/top-langs.svg
          git diff --staged --quiet || (git commit -m "chore: update readme stats" && git push)
